# Server configuration
server.port=8091
server.servlet.context-path=/jblockchain

# Blockchain configuration
# Number of leading zeros required in a valid block hash (proof-of-work difficulty)
# Higher values make mining slower. Recommended range: 2 (fast) to 5 (slow)
blockchain.mining.difficulty=4
blockchain.node.name=Node-1

# P2P Network configuration
# Maximum peers to contact per broadcast (0 = all peers)
blockchain.network.max-broadcast-peers=0

# Public base URL (scheme + host) of this node.
# On a remote server, replace with the public hostname: https://node1.example.com
# This property is REQUIRED - the application will not start if left blank.
blockchain.node.url=http://localhost

# Comma-separated list of seed node full URLs to contact at startup for auto-registration.
# Leave empty if this is the first (bootstrap) node in the network.
# Example (for Node-2 and Node-3): blockchain.network.seed-nodes=http://localhost:8091/jblockchain
blockchain.network.seed-nodes=

# Chain sync scheduler
blockchain.sync.enabled=true
blockchain.sync.interval=30000

# P2P UDP Discovery (local network auto-discovery)
# When enabled, nodes find each other automatically via UDP broadcast.
# Disable if using seed-nodes on a remote network instead.
blockchain.network.discovery.enabled=true
blockchain.network.discovery.port=8888
blockchain.network.discovery.interval=60000

# Peer health - evict peer after N consecutive failed HTTP calls
blockchain.network.max-failures=3

# API Routes - Blockchain
api.blockchain.base-path=/api/chain
api.blockchain.status=/status
api.blockchain.validate=/validate
api.blockchain.block=/{index}
api.blockchain.pending=/pending
api.blockchain.messages=/messages
api.blockchain.mine=/mine

# API Routes - Network
api.network.base-path=/api/network
api.network.nodes=/nodes
api.network.resolve=/resolve
api.network.broadcast=/broadcast

# Logging
logging.level.com.giovannimenzano.jblockchain=INFO
logging.pattern.console=%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr(%5p) %clr(---){faint} %clr([%t]){faint} %clr(%logger{39}){cyan} %clr(:){faint} %m%n

# File logging - one log per node, stored in /logs
logging.file.name=logs/${blockchain.node.name}.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} %5p --- [%t] %logger{39} : %m%n
